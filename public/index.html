<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台登录</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0f1115; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .card {
    background: #1a1d24; padding: 40px; border-radius: 12px; width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  h1 { color: #e8e8e8; font-size: 20px; margin: 0 0 24px; text-align: center; }
  input {
    width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 8px;
    border: 1px solid #333; background: #0f1115; color: #e8e8e8; font-size: 14px;
  }
  button {
    width: 100%; padding: 12px; border-radius: 8px; border: none;
    background: #5b8cff; color: white; font-size: 14px; cursor: pointer; font-weight: 600;
  }
  button:hover { background: #4a7aef; }
  .error { color: #ff6b6b; font-size: 13px; margin: -8px 0 12px; min-height: 18px; }
</style>
</head>
<body>
  <div class="card">
    <h1>销售 Bot 管理后台</h1>
    <input type="password" id="password" placeholder="密码" autofocus>
    <div class="error" id="error"></div>
    <button onclick="login()">登录</button>
  </div>
  <script>
    async function login() {
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/admin.html';
        } else {
          errorEl.textContent = data.error || '登录失败';
        }
      } catch (e) {
        errorEl.textContent = '网络错误，请重试';
      }
    }
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
